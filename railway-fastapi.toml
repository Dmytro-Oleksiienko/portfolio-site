# Railway configuration for the FastAPI contact service
#
# Use this file when deploying FastAPI as a separate Railway service.
# Rename to railway.toml in the FastAPI service's settings, or
# set the config path in Railway dashboard to "railway-fastapi.toml"

[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["python312", "gcc", "postgresql"]

[build.nixpacksPlan.phases.install]
cmds = ["pip install -r requirements.txt"]

[deploy]
startCommand = "uvicorn --app-dir portfolio fastapi_service.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
