# Railway configuration for the Django portfolio site

[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["python312", "gcc", "postgresql"]

[build.nixpacksPlan.phases.install]
cmds = ["pip install -r requirements.txt"]

[build.nixpacksPlan.phases.build]
cmds = [
  "python portfolio/manage.py collectstatic --noinput",
  "python portfolio/manage.py migrate --noinput",
  "python portfolio/manage.py seed_data"
]

[deploy]
startCommand = "python portfolio/manage.py runserver 0.0.0.0:$PORT"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
