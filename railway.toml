# Railway configuration for the Django portfolio site
# Each service in Railway is configured separately via the dashboard.
# This file configures the default service (Django).
# The FastAPI service should be set up as a separate service in Railway,
# pointing to the same repo with its own railway.toml or dashboard config.

[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["python312", "gcc", "postgresql"]

[build.nixpacksPlan.phases.install]
cmds = ["pip install -r requirements.txt"]

[build.nixpacksPlan.phases.build]
cmds = [
    "cd portfolio && python manage.py collectstatic --noinput",
    "cd portfolio && python manage.py migrate --noinput",
    "cd portfolio && python manage.py seed_data"
]

[deploy]
startCommand = "cd portfolio && gunicorn portfolio.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
